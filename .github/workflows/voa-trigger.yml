name: VOA Trigger ~ Auto Feeder Post

# Fires when vibrationofawesome.com publishes a new post and pings this repo.
#
# To trigger from VOA after publishing a post:
# curl -X POST \
#   -H "Authorization: token YOUR_GITHUB_PAT" \
#   -H "Accept: application/vnd.github.v3+json" \
#   https://api.github.com/repos/Lordshrrred/VOA_Feeder/dispatches \
#   -d '{
#     "event_type": "voa-post-published",
#     "client_payload": {
#       "voa_post_url": "https://vibrationofawesome.com/your-post-slug/",
#       "voa_post_title": "Your VOA Post Title",
#       "voa_post_keyword": "your keyword",
#       "voa_post_slug": "your-post-slug",
#       "voa_post_lane": "matt",
#       "voa_post_excerpt": "short excerpt",
#       "voa_post_tags": "archive, legacy",
#       "voa_post_category": "Inner Work",
#       "voa_post_source_text": "optional source body excerpt"
#     }
#   }'
#
# Note: Use a GitHub Personal Access Token (PAT) with repo scope.
# Generate one at: github.com/settings/tokens
# The token used in the curl call is YOUR PAT ~ not GITHUB_TOKEN.
# GITHUB_TOKEN is only available inside Actions runs.

on:
  repository_dispatch:
    types:
      - voa-post-published

concurrency:
  group: feeder-publish
  cancel-in-progress: false

jobs:
  generate-feeder-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate feeder post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VOA_FEEDER_TRIGGER_TOKEN: ${{ secrets.VOA_FEEDER_TRIGGER_TOKEN }}
          # Keep repository_dispatch payload out of the shell script itself.
          # Source text can contain Markdown fences/backticks, quotes, and newlines.
          VOA_POST_KEYWORD: ${{ github.event.client_payload.voa_post_keyword }}
          VOA_POST_CATEGORY: ${{ github.event.client_payload.voa_post_category || 'Breaking Out' }}
          VOA_POST_URL: ${{ github.event.client_payload.voa_post_url }}
          VOA_POST_TITLE: ${{ github.event.client_payload.voa_post_title }}
          VOA_POST_SLUG: ${{ github.event.client_payload.voa_post_slug }}
          VOA_POST_LANE: ${{ github.event.client_payload.voa_post_lane }}
          VOA_POST_EXCERPT: ${{ github.event.client_payload.voa_post_excerpt }}
          VOA_POST_TAGS: ${{ github.event.client_payload.voa_post_tags }}
          VOA_POST_SOURCE_TEXT: ${{ github.event.client_payload.voa_post_source_text }}
        run: |
          node scripts/generate-post.js \
            --keyword "$VOA_POST_KEYWORD" \
            --category "$VOA_POST_CATEGORY" \
            --voa_post_url "$VOA_POST_URL" \
            --voa_post_title "$VOA_POST_TITLE" \
            --voa_post_slug "$VOA_POST_SLUG" \
            --voa_post_lane "$VOA_POST_LANE" \
            --voa_post_excerpt "$VOA_POST_EXCERPT" \
            --voa_post_tags "$VOA_POST_TAGS" \
            --voa_post_source_text "$VOA_POST_SOURCE_TEXT"
