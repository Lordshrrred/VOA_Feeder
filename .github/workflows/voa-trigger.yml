name: VOA Trigger ~ Auto Feeder Post

# Fires when vibrationofawesome.com publishes a new post and pings this repo.
#
# To trigger from VOA after publishing a post:
# curl -X POST \
#   -H "Authorization: token YOUR_GITHUB_PAT" \
#   -H "Accept: application/vnd.github.v3+json" \
#   https://api.github.com/repos/Lordshrrred/VOA_GithubPages/dispatches \
#   -d '{
#     "event_type": "voa-post-published",
#     "client_payload": {
#       "voa_post_url": "https://vibrationofawesome.com/your-post-slug/",
#       "voa_post_title": "Your VOA Post Title",
#       "voa_post_keyword": "your keyword"
#     }
#   }'
#
# Note: Use a GitHub Personal Access Token (PAT) with repo scope.
# Generate one at: github.com/settings/tokens
# The token used in the curl call is YOUR PAT ~ not GITHUB_TOKEN.
# GITHUB_TOKEN is only available inside Actions runs.

on:
  repository_dispatch:
    types:
      - voa-post-published

jobs:
  generate-feeder-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build feeder article title
        id: build_title
        run: |
          VOA_TITLE="${{ github.event.client_payload.voa_post_title }}"
          KEYWORD="${{ github.event.client_payload.voa_post_keyword }}"

          # Generate a related-but-distinct title by appending a new angle
          FEEDER_TITLE="What Nobody Tells You About ${KEYWORD^}"

          echo "feeder_title=${FEEDER_TITLE}" >> $GITHUB_OUTPUT
          echo "keyword=${KEYWORD}" >> $GITHUB_OUTPUT

      - name: Generate feeder post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/generate-post.js \
            --keyword "${{ steps.build_title.outputs.keyword }}" \
            --title "${{ steps.build_title.outputs.feeder_title }}" \
            --category "Breaking Out" \
            --voa_post_url "${{ github.event.client_payload.voa_post_url }}" \
            --voa_post_title "${{ github.event.client_payload.voa_post_title }}"
